<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Projeto | Rafael Morici</title>
  <meta name="description" content="Detalhes do projeto - Portfolio de Rafael Veneroso Morici">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand"><span>&lt;/&gt;</span> Rafael Morici</a>
      <div class="navbar-links">
        <a href="index.html#about" data-i18n="nav.about">Sobre</a>
        <a href="index.html#skills" data-i18n="nav.skills">Skills</a>
        <a href="index.html#experience" data-i18n="nav.experience">Experiencia</a>
        <a href="index.html#projects" data-i18n="nav.projects">Projetos</a>
        <a href="index.html#contact" data-i18n="nav.contact">Contato</a>
      </div>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="pt">PT</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
      <button class="hamburger" aria-label="Menu">&#9776;</button>
    </div>
  </nav>

  <!-- Project Hero -->
  <section class="project-hero">
    <div class="container">
      <div class="breadcrumb">
        <a href="index.html" data-i18n="detail.home">Home</a>
        <span class="sep">/</span>
        <a href="index.html#projects" data-i18n="detail.projects">Projetos</a>
        <span class="sep">/</span>
        <span class="accent" id="breadcrumb-name"></span>
      </div>
      <h1 id="project-name"></h1>
      <p class="tagline" id="project-tagline"></p>
      <div class="project-meta" id="project-meta"></div>
    </div>
  </section>

  <!-- Project Body -->
  <div class="container">
    <div class="project-body">
      <div class="project-main" id="project-main"></div>
      <aside class="project-sidebar" id="project-sidebar"></aside>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      &copy; 2026 Rafael Veneroso Morici &bull; Belo Horizonte, MG
    </div>
  </footer>

  <script src="js/projects.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const p = PROJECTS[id];

    function renderProjectDetail() {
      if (!p) {
        document.getElementById('project-name').textContent = currentLang === 'en' ? 'Project not found' : 'Projeto nao encontrado';
        document.getElementById('project-tagline').textContent = currentLang === 'en' ? 'Go back to the main page.' : 'Volte para a pagina principal.';
        return;
      }

      // Page title
      document.getElementById('page-title').textContent = `${p.name} | Rafael Morici`;
      document.getElementById('breadcrumb-name').textContent = p.name;

      // Hero
      document.getElementById('project-name').innerHTML = `<span style="color:${p.color}">${p.icon}</span> ${p.name}`;
      document.getElementById('project-tagline').textContent = projectField(p, 'tagline');

      // Meta badges
      const metaHtml = `
        <div class="meta-badge"><span class="meta-icon" style="color:${p.color}">${p.icon}</span> ${p.number}</div>
        <div class="meta-badge"><span class="meta-icon" style="color:#3fb950">&#10003;</span> <strong>${p.tests} ${t('projects.tests')}</strong></div>
        <div class="meta-badge"><span class="meta-icon">&#9881;</span> .NET 10</div>
        <div class="meta-badge"><span class="meta-icon">&#128451;</span> PostgreSQL</div>
      `;
      document.getElementById('project-meta').innerHTML = metaHtml;

      // Main content
      const features = projectField(p, 'features');
      let mainHtml = `
        <h2>${t('detail.description')}</h2>
        <p>${projectField(p, 'description')}</p>

        <h2>${t('detail.features')}</h2>
        <ul>${features.map(f => `<li>${f}</li>`).join('')}</ul>
      `;

      if (p.endpoints && p.endpoints.length > 0) {
        mainHtml += `
          <h2>${t('detail.endpoints')}</h2>
          <table class="endpoint-table">
            <thead><tr><th>${t('detail.th.method')}</th><th>${t('detail.th.route')}</th><th>${t('detail.th.desc')}</th></tr></thead>
            <tbody>
              ${p.endpoints.map(e => {
                const cls = `method-${e.method.toLowerCase()}`;
                const desc = (currentLang === 'en' && e.desc_en) ? e.desc_en : e.desc;
                return `<tr>
                  <td><span class="method ${cls}">${e.method}</span></td>
                  <td><code>${e.path}</code></td>
                  <td>${desc}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        `;
      }

      // Project navigation
      const keys = Object.keys(PROJECTS);
      const idx = keys.indexOf(id);
      mainHtml += '<div style="display:flex;gap:12px;justify-content:space-between;padding:40px 0 80px;">';
      if (idx > 0) {
        const prevKey = keys[idx - 1];
        const prev = PROJECTS[prevKey];
        mainHtml += `<a href="project.html?id=${prevKey}" class="btn btn-outline">&larr; ${prev.name}</a>`;
      } else {
        mainHtml += '<span></span>';
      }
      if (idx < keys.length - 1) {
        const nextKey = keys[idx + 1];
        const next = PROJECTS[nextKey];
        mainHtml += `<a href="project.html?id=${nextKey}" class="btn btn-outline">${next.name} &rarr;</a>`;
      }
      mainHtml += '</div>';

      document.getElementById('project-main').innerHTML = mainHtml;

      // Sidebar
      let sideHtml = `
        <a href="${p.repo}" target="_blank" class="btn-github">
          &#128187; ${t('detail.github')} &nearr;
        </a>

        <div class="sidebar-card">
          <h3>&#9881; ${t('detail.technologies')}</h3>
          <div class="tech-list">
            ${p.technologies.map(tc => `<span class="tech-item">${tc}</span>`).join('')}
          </div>
        </div>

        <div class="sidebar-card">
          <h3>&#127959; ${t('detail.patterns')}</h3>
          <ul class="pattern-list">
            ${p.patterns.map(pt => `<li>${pt}</li>`).join('')}
          </ul>
        </div>

        <div class="sidebar-card">
          <h3>&#128300; ${t('detail.tests')}</h3>
          <div style="text-align:center; padding: 12px 0;">
            <div style="font-size: 2.5rem; font-weight: 800; color: #3fb950;">${p.tests}</div>
            <div style="color: #7d8590; font-size: .85rem;">${t('detail.tests.label')}</div>
            <div style="color: #484f58; font-size: .8rem; margin-top: 8px;">xUnit + Moq + EF InMemory</div>
          </div>
        </div>
      `;

      document.getElementById('project-sidebar').innerHTML = sideHtml;
    }

    renderProjectDetail();
    document.addEventListener('langchange', () => {
      applyTranslations();
      renderProjectDetail();
    });
  </script>

</body>
</html>
